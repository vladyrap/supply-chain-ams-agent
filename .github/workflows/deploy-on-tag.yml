name: Deploy on tag

# =============================================================================
# v1.2.5-prod — Deploy automático al VPS cuando se pushea un tag *-prod
# =============================================================================
# Convención de tags (v1.2.5-qas):
#   - v1.2.5-qas-*      → solo CI, NO deploya (QAS local del dev)
#   - v1.2.5-prod       → CI + deploy en VPS (release productivo)
#   - v1.2.5-rc.1       → CI + deploy en staging si existe
#   - v1.2.5-hotfix-XX  → CI + deploy si termina en -prod
#
# Solo tags con sufijo `-prod` disparan deploy real. Esto previene deploys
# accidentales con tags de prueba.
#
# FIX C8 (audit v1.1.0): regex validation, bash -s stdin, set -euo pipefail.
#
# Requiere secrets configurados en el repo (Settings → Secrets):
#   - VPS_HOST              (ej: 82.223.196.65)
#   - VPS_USER              (ej: root o ams)
#   - VPS_SSH_KEY           (clave SSH privada, formato OpenSSH)
#   - VPS_DEPLOY_PATH       (ej: /opt/ams/supply-chain-ams-stack)
#   - VPS_HOST_FINGERPRINT  (output de: ssh-keyscan -t ed25519 IP)
#   - AMS_DOMAIN            (ej: ams.roccoai.cl) — para smoke test
# =============================================================================

on:
  push:
    tags:
      - "v*-prod"          # v1.2.5-prod
      - "v*-hotfix-*-prod" # v1.2.5-hotfix-abc-prod
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a desplegar (debe terminar en -prod)"
        required: true

jobs:
  deploy:
    name: Deploy a VPS prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve and validate tag
        id: tagcheck
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$REF_TAG}"
          # Validar formato estricto vX.Y.Z[-suffix] — bloquea injection.
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Tag inválido: '$TAG'. Esperado: vX.Y.Z o vX.Y.Z-suffix"
            exit 1
          fi
          # NUEVO: validar que termina en -prod (releases productivos).
          if [[ "$TAG" != *-prod ]]; then
            echo "::error::Tag '$TAG' no termina en -prod. Solo tags productivos disparan deploy."
            echo "::error::Para QAS local usar -qas-X. Para deploy prod usar v1.2.5-prod."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Desplegando tag productivo: $TAG"

      - name: Verify required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          AMS_DOMAIN: ${{ secrets.AMS_DOMAIN }}
          VPS_HOST_FINGERPRINT: ${{ secrets.VPS_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${VPS_HOST:-}" ] && missing+=("VPS_HOST")
          [ -z "${VPS_USER:-}" ] && missing+=("VPS_USER")
          [ -z "${VPS_DEPLOY_PATH:-}" ] && missing+=("VPS_DEPLOY_PATH")
          [ -z "${AMS_DOMAIN:-}" ] && missing+=("AMS_DOMAIN")
          [ -z "${VPS_HOST_FINGERPRINT:-}" ] && missing+=("VPS_HOST_FINGERPRINT")
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Faltan secrets: ${missing[*]}"
            exit 1
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Pin VPS host fingerprint (no MITM)
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # FIX C8 derivado: usar fingerprint conocido en vez de ssh-keyscan ciego.
          echo "${{ secrets.VPS_HOST_FINGERPRINT }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Pull + redeploy stack
        env:
          TAG: ${{ steps.tagcheck.outputs.tag }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          # FIX C8: pasar TAG como ARGUMENTO ($1 dentro del HEREDOC vía bash -s).
          # El script remoto está QUOTED con 'REMOTE' → no se expande nada local.
          # set -euo pipefail dentro del script remoto SÍ aplica (es bash real).
          ssh "${VPS_USER}@${VPS_HOST}" bash -s -- "$TAG" "$VPS_DEPLOY_PATH" <<'REMOTE'
          set -euo pipefail
          TAG="$1"
          DEPLOY_PATH="$2"
          echo "==> Desplegando tag $TAG en $DEPLOY_PATH"
          cd "$DEPLOY_PATH/../supply-chain-ams-agent"
          git fetch --tags --quiet
          git checkout "tags/$TAG" --quiet
          cd "$DEPLOY_PATH/../supply-chain-ams-platform"
          git fetch --tags --quiet
          # platform puede no tener el mismo tag (deploy individual)
          git checkout "tags/$TAG" --quiet || echo "(platform sin tag $TAG, sigue con HEAD actual)"
          cd "$DEPLOY_PATH"
          git pull --ff-only --quiet
          bash deploy.sh prod
          echo "==> Deploy OK"
          REMOTE

      - name: Smoke test post-deploy
        env:
          AMS_DOMAIN: ${{ secrets.AMS_DOMAIN }}
        run: |
          set -euo pipefail
          # FIX C8: quitar -k (insecure). Si TLS no es válido el deploy falla.
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${AMS_DOMAIN}/status" || echo 000)
            if [ "$STATUS" = "200" ]; then
              echo "✓ /status responde 200 después de $((i*5))s"
              exit 0
            fi
            echo "Esperando warmup... (status: $STATUS, intento $i/30)"
            sleep 5
          done
          echo "::error::Timeout esperando warmup post-deploy en https://${AMS_DOMAIN}/status"
          exit 1
