name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-typecheck:
    name: Backend · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (no scripts)
        run: npm install --no-audit --no-fund --ignore-scripts
      - name: TypeScript check
        run: npx tsc --noEmit

  worker-typecheck:
    name: Worker · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (no scripts)
        run: npm install --no-audit --no-fund --ignore-scripts
      - name: TypeScript check
        run: npx tsc --noEmit

  docker-build:
    name: Docker · compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render docker-compose.yml
        run: |
          # Copia .env.example a .env temporal solo para que compose pueda
          # resolver las referencias de variables — no se ejecuta el stack.
          cp .env.example .env
          docker compose -f docker-compose.yml config --quiet
          rm .env

  sql-lint:
    name: SQL · syntax sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Postgres dry-run
        run: |
          # FIX B9 (audit v1.1.0): trap EXIT cleanup container incluso si psql falla.
          set -euo pipefail
          trap 'docker rm -f pg-ci >/dev/null 2>&1 || true' EXIT
          docker run --rm -d --name pg-ci -e POSTGRES_PASSWORD=ci -p 5432:5432 pgvector/pgvector:pg16
          for i in $(seq 1 20); do
            docker exec pg-ci pg_isready -U postgres >/dev/null 2>&1 && break
            sleep 1
          done
          docker exec -i pg-ci psql -U postgres -d postgres -v ON_ERROR_STOP=1 < database/init.sql
