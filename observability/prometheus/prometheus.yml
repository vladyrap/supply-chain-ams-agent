global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: supply-chain-ams-agent

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ams-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["supply-chain-ams-backend:8000"]
        labels:
          service: ams-backend
