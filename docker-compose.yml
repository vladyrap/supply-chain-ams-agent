name: supply-chain-ams-agent

services:
  # ----------------------------------------
  # Frontend Next.js
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supply-chain-ams-frontend
    restart: unless-stopped
    ports:
      - "6600:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${FRONTEND_PUBLIC_API_URL:-http://localhost:6601}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Backend Fastify + TS
  # ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supply-chain-ams-backend
    restart: unless-stopped
    ports:
      - "6601:8000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BACKEND_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Whisper ASR (transcripcion local, Fase 5)
  # Modelo base por defecto. Cambiar ASR_MODEL a small/medium para mas calidad.
  # ----------------------------------------
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: supply-chain-ams-whisper
    restart: unless-stopped
    ports:
      - "6611:9000"
    environment:
      ASR_MODEL: base
      ASR_ENGINE: openai_whisper
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Worker (jobs RAG + transcripciones)
  # ----------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: supply-chain-ams-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # PostgreSQL
  # ----------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: supply-chain-ams-db
    restart: unless-stopped
    ports:
      - "6602:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ams_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ams_password}
      POSTGRES_DB: ${POSTGRES_DB:-ams_agent}
    volumes:
      - supply-chain-ams-postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ams_user} -d ${POSTGRES_DB:-ams_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Redis
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: supply-chain-ams-redis
    restart: unless-stopped
    ports:
      - "6603:6379"
    volumes:
      - supply-chain-ams-redis-data:/data
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Elasticsearch (single-node, sin seguridad para local)
  # ----------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: supply-chain-ams-elasticsearch
    restart: unless-stopped
    ports:
      - "6620:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - supply-chain-ams-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Kibana
  # ----------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: supply-chain-ams-kibana
    restart: unless-stopped
    ports:
      - "6604:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://supply-chain-ams-elasticsearch:9200
    volumes:
      - supply-chain-ams-kibana-data:/usr/share/kibana/data
    depends_on:
      - elasticsearch
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Logstash
  # ----------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: supply-chain-ams-logstash
    restart: unless-stopped
    ports:
      - "6610:5044"
    volumes:
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      - elasticsearch
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Prometheus
  # ----------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: supply-chain-ams-prometheus
    restart: unless-stopped
    ports:
      - "6609:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - supply-chain-ams-prometheus-data:/prometheus
    networks:
      - supply-chain-ams-network

  # ----------------------------------------
  # Grafana
  # ----------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: supply-chain-ams-grafana
    restart: unless-stopped
    ports:
      - "6605:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - supply-chain-ams-grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - supply-chain-ams-network

# ----------------------------------------
# Network
# ----------------------------------------
networks:
  supply-chain-ams-network:
    name: supply-chain-ams-network
    driver: bridge

# ----------------------------------------
# Volumes
# ----------------------------------------
volumes:
  supply-chain-ams-postgres-data:
    name: supply-chain-ams-postgres-data
  supply-chain-ams-redis-data:
    name: supply-chain-ams-redis-data
  supply-chain-ams-elasticsearch-data:
    name: supply-chain-ams-elasticsearch-data
  supply-chain-ams-kibana-data:
    name: supply-chain-ams-kibana-data
  supply-chain-ams-prometheus-data:
    name: supply-chain-ams-prometheus-data
  supply-chain-ams-grafana-data:
    name: supply-chain-ams-grafana-data
